<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problems - CodeJudge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-code"></i> CodeJudge
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="problems.html">Problems</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contests.html">Contests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="leaderboard.html">Leaderboard</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showLogin()">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showRegister()">Register</a>
                    </li>
                    <li class="nav-item d-none" id="user-menu">
                        <div class="dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user"></i> <span id="username"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                                <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Problems Section -->
    <section class="problem-list">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <h1 class="mb-4">Problems</h1>
                    
                    <!-- Filters -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <select class="form-select" id="difficultyFilter">
                                <option value="">All Difficulties</option>
                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select" id="tagFilter">
                                <option value="">All Tags</option>
                                <option value="array">Array</option>
                                <option value="string">String</option>
                                <option value="hash-table">Hash Table</option>
                                <option value="binary-search">Binary Search</option>
                                <option value="dynamic-programming">Dynamic Programming</option>
                                <option value="two-pointers">Two Pointers</option>
                                <option value="divide-and-conquer">Divide and Conquer</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <input type="text" class="form-control" id="searchFilter" placeholder="Search problems...">
                        </div>
                    </div>

                    <!-- Problems Table -->
                    <div class="problem-table">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Title</th>
                                    <th>Difficulty</th>
                                    <th>Tags</th>
                                    <th>Solved</th>
                                    <th>Acceptance Rate</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="problems-tbody">
                                <!-- Problems will be loaded here -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <nav aria-label="Problems pagination" class="mt-4">
                        <ul class="pagination justify-content-center" id="pagination">
                            <!-- Pagination will be loaded here -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="loginUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Register</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="registerUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="registerUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="registerEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="registerPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 CodeJudge. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Problems page specific JavaScript
        let currentPage = 1;
        const problemsPerPage = 10;
        let filteredProblems = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadProblems();
            setupFilters();
        });

        function loadProblems() {
            const problems = codeJudge.getProblems();
            filteredProblems = problems;
            displayProblems();
            setupPagination();
        }

        function displayProblems() {
            const tbody = document.getElementById('problems-tbody');
            tbody.innerHTML = '';
            
            const start = (currentPage - 1) * problemsPerPage;
            const end = start + problemsPerPage;
            const paginatedProblems = filteredProblems.slice(start, end);
            
            const currentUser = auth.getCurrentUser();
            const solvedProblems = currentUser ? currentUser.solvedProblems : [];
            
            paginatedProblems.forEach(problem => {
                const row = document.createElement('tr');
                const acceptanceRate = ((problem.solvedBy / problem.attempts) * 100).toFixed(1);
                const isSolved = solvedProblems.includes(problem.id);
                
                row.innerHTML = `
                    <td>${problem.id}</td>
                    <td>
                        <a href="problem.html?id=${problem.id}" class="text-decoration-none">
                            ${problem.title}
                        </a>
                    </td>
                    <td>
                        <span class="badge bg-${getDifficultyColor(problem.difficulty)}">
                            ${problem.difficulty}
                        </span>
                    </td>
                    <td>
                        ${problem.tags.map(tag => `<span class="badge bg-secondary me-1">${tag}</span>`).join('')}
                    </td>
                    <td>${problem.solvedBy}</td>
                    <td>${acceptanceRate}%</td>
                    <td>
                        ${isSolved ? '<i class="fas fa-check text-success"></i>' : '<i class="fas fa-minus text-muted"></i>'}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function setupPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            const totalPages = Math.ceil(filteredProblems.length / problemsPerPage);
            
            // Previous button
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage - 1})">Previous</a>`;
            pagination.appendChild(prevLi);
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="changePage(${i})">${i}</a>`;
                pagination.appendChild(li);
            }
            
            // Next button
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
            nextLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage + 1})">Next</a>`;
            pagination.appendChild(nextLi);
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredProblems.length / problemsPerPage);
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            displayProblems();
            setupPagination();
        }

        function setupFilters() {
            const difficultyFilter = document.getElementById('difficultyFilter');
            const tagFilter = document.getElementById('tagFilter');
            const searchFilter = document.getElementById('searchFilter');
            
            [difficultyFilter, tagFilter, searchFilter].forEach(filter => {
                filter.addEventListener('change', applyFilters);
                filter.addEventListener('input', applyFilters);
            });
        }

        function applyFilters() {
            const difficulties = document.getElementById('difficultyFilter').value;
            const tags = document.getElementById('tagFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            
            const problems = codeJudge.getProblems();
            
            filteredProblems = problems.filter(problem => {
                const matchesDifficulty = !difficulties || problem.difficulty === difficulties;
                const matchesTag = !tags || problem.tags.includes(tags);
                const matchesSearch = !search || 
                    problem.title.toLowerCase().includes(search) ||
                    problem.description.toLowerCase().includes(search);
                
                return matchesDifficulty && matchesTag && matchesSearch;
            });
            
            currentPage = 1;
            displayProblems();
            setupPagination();
        }
    </script>
</body>
</html>
