<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem - CodeJudge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism-dark.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-code"></i> CodeJudge
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="problems.html">Problems</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contests.html">Contests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="leaderboard.html">Leaderboard</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showLogin()">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showRegister()">Register</a>
                    </li>
                    <li class="nav-item d-none" id="user-menu">
                        <div class="dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user"></i> <span id="username"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                                <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Problem Section -->
    <section class="py-5">
        <div class="container-fluid">
            <div class="row">
                <!-- Problem Description -->
                <div class="col-lg-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-primary text-white">
                            <h4 class="mb-0" id="problem-title">Loading...</h4>
                        </div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <span class="badge me-2" id="problem-difficulty">Loading...</span>
                                    <span id="problem-tags"></span>
                                </div>
                                <div class="text-muted">
                                    <small>Solved by <span id="problem-solved">0</span> users</small>
                                </div>
                            </div>
                            
                            <div class="problem-description" id="problem-description">
                                Loading problem description...
                            </div>
                            
                            <div class="mt-4" id="problem-examples">
                                <!-- Examples will be loaded here -->
                            </div>
                            
                            <div class="mt-4" id="problem-constraints">
                                <!-- Constraints will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Code Editor -->
                <div class="col-lg-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-success text-white">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">Code Editor</h5>
                                <select class="form-select form-select-sm" id="language-select" style="width: auto;">
                                    <option value="cpp">C++</option>
                                    <option value="java">Java</option>
                                    <option value="python">Python</option>
                                    <option value="javascript">JavaScript</option>
                                </select>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div class="code-editor">
                                <textarea id="code-textarea" placeholder="Write your code here..."></textarea>
                            </div>
                        </div>
                        <div class="card-footer">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <button class="btn btn-outline-primary" onclick="runCode()">
                                        <i class="fas fa-play"></i> Run
                                    </button>
                                    <button class="btn btn-primary" onclick="submitCode()">
                                        <i class="fas fa-paper-plane"></i> Submit
                                    </button>
                                </div>
                                <div>
                                    <button class="btn btn-outline-secondary" onclick="resetCode()">
                                        <i class="fas fa-redo"></i> Reset
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Results Section -->
                    <div class="card shadow-sm mt-3" id="results-card" style="display: none;">
                        <div class="card-header">
                            <h5 class="mb-0">Results</h5>
                        </div>
                        <div class="card-body" id="results-content">
                            <!-- Results will be displayed here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="loginUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Register</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="registerUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="registerUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="registerEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="registerPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 CodeJudge. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentProblem = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProblem();
            setupCodeEditor();
        });
        
        function loadProblem() {
            const urlParams = new URLSearchParams(window.location.search);
            const problemId = urlParams.get('id');
            
            if (!problemId) {
                window.location.href = 'problems.html';
                return;
            }
            
            currentProblem = codeJudge.getProblem(problemId);
            
            if (!currentProblem) {
                alert('Problem not found!');
                window.location.href = 'problems.html';
                return;
            }
            
            displayProblem();
        }
        
        function displayProblem() {
            document.getElementById('problem-title').textContent = currentProblem.title;
            document.getElementById('problem-difficulty').textContent = currentProblem.difficulty;
            document.getElementById('problem-difficulty').className = `badge bg-${getDifficultyColor(currentProblem.difficulty)}`;
            document.getElementById('problem-solved').textContent = currentProblem.solvedBy;
            document.getElementById('problem-description').innerHTML = currentProblem.description;
            
            // Display tags
            const tagsContainer = document.getElementById('problem-tags');
            tagsContainer.innerHTML = currentProblem.tags.map(tag => 
                `<span class="badge bg-secondary me-1">${tag}</span>`
            ).join('');
            
            // Display examples
            const examplesContainer = document.getElementById('problem-examples');
            examplesContainer.innerHTML = '<h5>Examples:</h5>';
            currentProblem.examples.forEach((example, index) => {
                examplesContainer.innerHTML += `
                    <div class="example-box mb-3">
                        <h6>Example ${index + 1}:</h6>
                        <div class="row">
                            <div class="col-md-6">
                                <strong>Input:</strong>
                                <pre class="bg-light p-2 rounded"><code>${example.input}</code></pre>
                            </div>
                            <div class="col-md-6">
                                <strong>Output:</strong>
                                <pre class="bg-light p-2 rounded"><code>${example.output}</code></pre>
                            </div>
                        </div>
                        ${example.explanation ? `<p><strong>Explanation:</strong> ${example.explanation}</p>` : ''}
                    </div>
                `;
            });
            
            // Display constraints
            const constraintsContainer = document.getElementById('problem-constraints');
            constraintsContainer.innerHTML = `
                <h5>Constraints:</h5>
                <pre class="bg-light p-3 rounded">${currentProblem.constraints}</pre>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <strong>Time Limit:</strong> ${currentProblem.timeLimit}ms
                    </div>
                    <div class="col-md-6">
                        <strong>Memory Limit:</strong> ${currentProblem.memoryLimit}MB
                    </div>
                </div>
            `;
        }
        
        function setupCodeEditor() {
            const codeTemplates = {
                'cpp': `#include <iostream>
#include <vector>
using namespace std;

int main() {
    // Your code here
    return 0;
}`,
                'java': `import java.util.*;

public class Solution {
    public static void main(String[] args) {
        // Your code here
    }
}`,
                'python': `# Your code here
def solution():
    pass

if __name__ == "__main__":
    solution()`,
                'javascript': `// Your code here
function solution() {
    
}

solution();`
            };
            
            const languageSelect = document.getElementById('language-select');
            const codeTextarea = document.getElementById('code-textarea');
            
            languageSelect.addEventListener('change', function() {
                const language = this.value;
                if (codeTextarea.value.trim() === '' || confirm('This will reset your code. Continue?')) {
                    codeTextarea.value = codeTemplates[language];
                }
            });
            
            // Set initial template
            codeTextarea.value = codeTemplates['cpp'];
        }
        
        function runCode() {
            const code = document.getElementById('code-textarea').value;
            const language = document.getElementById('language-select').value;
            
            if (!code.trim()) {
                alert('Please write some code first!');
                return;
            }
            
            // Show loading
            showResult('Running code...', 'info');
            
            // Simulate code execution
            setTimeout(() => {
                showResult('Sample output:\nHello World!', 'success');
            }, 1000);
        }
        
        function submitCode() {
            if (!auth.isLoggedIn()) {
                alert('Please login to submit code!');
                showLogin();
                return;
            }
            
            const code = document.getElementById('code-textarea').value;
            const language = document.getElementById('language-select').value;
            
            if (!code.trim()) {
                alert('Please write some code first!');
                return;
            }
            
            // Show loading
            showResult('Submitting code...', 'info');
            
            // Submit code
            codeJudge.submitCode(currentProblem.id, code, language)
                .then(submission => {
                    displaySubmissionResult(submission);
                })
                .catch(error => {
                    showResult('Submission failed: ' + error.message, 'danger');
                });
        }
        
        function resetCode() {
            if (confirm('Are you sure you want to reset your code?')) {
                setupCodeEditor();
            }
        }
        
        function showResult(message, type) {
            const resultsCard = document.getElementById('results-card');
            const resultsContent = document.getElementById('results-content');
            
            resultsCard.style.display = 'block';
            resultsContent.innerHTML = `
                <div class="alert alert-${type} mb-0">
                    <pre class="mb-0">${message}</pre>
                </div>
            `;
        }
        
        function displaySubmissionResult(submission) {
            const resultsCard = document.getElementById('results-card');
            const resultsContent = document.getElementById('results-content');
            
            resultsCard.style.display = 'block';
            
            const statusColor = getStatusColor(submission.status);
            
            resultsContent.innerHTML = `
                <div class="submission-result result-${statusColor}">
                    <h5>
                        <span class="badge bg-${statusColor}">${submission.status}</span>
                    </h5>
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <strong>Execution Time:</strong> ${submission.time}
                        </div>
                        <div class="col-md-6">
                            <strong>Memory Used:</strong> ${submission.memory}
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-6">
                            <strong>Language:</strong> ${submission.language.toUpperCase()}
                        </div>
                        <div class="col-md-6">
                            <strong>Submitted:</strong> ${new Date(submission.timestamp).toLocaleString()}
                        </div>
                    </div>
                </div>
            `;
            
            // If accepted, show congratulations
            if (submission.status === 'Accepted') {
                resultsContent.innerHTML += `
                    <div class="alert alert-success mt-3">
                        <h6><i class="fas fa-check-circle"></i> Congratulations!</h6>
                        <p class="mb-0">Your solution has been accepted! You have successfully solved this problem.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
