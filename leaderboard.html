<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - CodeJudge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-code"></i> CodeJudge
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="problems.html">Problems</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contests.html">Contests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="leaderboard.html">Leaderboard</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showLogin()">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showRegister()">Register</a>
                    </li>
                    <li class="nav-item d-none" id="user-menu">
                        <div class="dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user"></i> <span id="username"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                                <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Leaderboard Section -->
    <section class="py-5">
        <div class="container">
            <h1 class="text-center mb-5">Leaderboard</h1>
            
            <div class="row">
                <div class="col-lg-8 mx-auto">
                    <div class="leaderboard-card">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Rank</th>
                                        <th>User</th>
                                        <th>Rating</th>
                                        <th>Problems Solved</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="leaderboard-tbody">
                                    <!-- Leaderboard data will be loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="loginUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Register</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="registerUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="registerUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="registerEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="registerPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 CodeJudge. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadLeaderboard();
        });

        function loadLeaderboard() {
            const leaderboard = codeJudge.getLeaderboard();
            const tbody = document.getElementById('leaderboard-tbody');
            tbody.innerHTML = '';

            // Add some sample users if none exist
            if (leaderboard.length === 0) {
                const sampleUsers = [
                    { username: 'CodeMaster', rating: 2150, solvedProblems: 45, rank: 'Expert' },
                    { username: 'AlgoWizard', rating: 1890, solvedProblems: 38, rank: 'Specialist' },
                    { username: 'BugHunter', rating: 1654, solvedProblems: 32, rank: 'Pupil' },
                    { username: 'LogicLord', rating: 1423, solvedProblems: 28, rank: 'Newbie' },
                    { username: 'CodeNinja', rating: 1298, solvedProblems: 24, rank: 'Newbie' },
                    { username: 'DevGeek', rating: 1156, solvedProblems: 19, rank: 'Newbie' }
                ];

                sampleUsers.forEach((user, index) => {
                    const row = createLeaderboardRow(user, index + 1);
                    tbody.appendChild(row);
                });
            } else {
                leaderboard.forEach((user, index) => {
                    const row = createLeaderboardRow(user, index + 1);
                    tbody.appendChild(row);
                });
            }
        }

        function createLeaderboardRow(user, rank) {
            const row = document.createElement('tr');
            
            // Determine rank badge class
            let rankBadgeClass = 'rank-other';
            if (rank === 1) rankBadgeClass = 'rank-1';
            else if (rank === 2) rankBadgeClass = 'rank-2';
            else if (rank === 3) rankBadgeClass = 'rank-3';

            // Determine rating color
            let ratingColor = 'text-secondary';
            if (user.rating >= 2000) ratingColor = 'text-danger';
            else if (user.rating >= 1600) ratingColor = 'text-warning';
            else if (user.rating >= 1200) ratingColor = 'text-info';
            else ratingColor = 'text-success';

            // Check if current user
            const currentUser = auth.getCurrentUser();
            const isCurrentUser = currentUser && currentUser.username === user.username;

            row.innerHTML = `
                <td>
                    <div class="d-flex align-items-center">
                        <div class="rank-badge ${rankBadgeClass}">
                            ${rank <= 3 ? '<i class="fas fa-trophy"></i>' : rank}
                        </div>
                        ${rank <= 3 ? `<strong>#${rank}</strong>` : `#${rank}`}
                    </div>
                </td>
                <td>
                    <div class="d-flex align-items-center">
                        <div class="me-2">
                            <i class="fas fa-user-circle fs-4 text-primary"></i>
                        </div>
                        <div>
                            <strong ${isCurrentUser ? 'class="text-primary"' : ''}>${user.username}</strong>
                            ${isCurrentUser ? '<br><small class="text-muted">You</small>' : ''}
                        </div>
                    </div>
                </td>
                <td>
                    <span class="fw-bold ${ratingColor}">${user.rating}</span>
                    <br>
                    <small class="text-muted">${getRankTitle(user.rating)}</small>
                </td>
                <td>
                    <span class="badge bg-primary">${user.solvedProblems}</span>
                </td>
                <td>
                    <span class="badge bg-success">
                        <i class="fas fa-check"></i> Active
                    </span>
                </td>
            `;

            // Highlight current user's row
            if (isCurrentUser) {
                row.classList.add('table-primary');
            }

            return row;
        }

        function getRankTitle(rating) {
            if (rating >= 2400) return 'International Master';
            if (rating >= 2100) return 'Master';
            if (rating >= 1900) return 'Expert';
            if (rating >= 1600) return 'Specialist';
            if (rating >= 1400) return 'Pupil';
            return 'Newbie';
        }
    </script>
</body>
</html>
