<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Code Editor</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid mt-3">
        <h1 class="text-center mb-4">Online Code Editor</h1>

        <div class="row">
            <div class="col-md-7">
                <div class="form-group">
                    <label for="languageSelect">Select Language:</label>
                    <select id="languageSelect" class="form-control form-control-sm w-auto">
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="c">C</option>
                        <option value="cpp">C++</option>
                        <option value="php">PHP</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="codeInput">Code:</label>
                    <textarea id="codeInput" class="form-control" rows="15" placeholder="Enter your code here..."></textarea>
                </div>
            </div>
            <div class="col-md-5">
                <div class="form-group">
                    <label for="stdInput">Standard Input (stdin):</label>
                    <textarea id="stdInput" class="form-control" rows="5" placeholder="Enter input for your code (if any)..."></textarea>
                </div>
                <button id="runButton" class="btn btn-primary btn-block mb-3">Run Code</button>
                <div class="form-group">
                    <label for="outputArea">Output:</label>
                    <pre id="outputArea" class="bg-light p-3 rounded border" style="min-height: 150px;"></pre>
                </div>
                <div class="form-group">
                     <label for="previewArea">Live Preview (HTML/CSS/JS):</label>
                     <iframe id="previewArea" class="w-100 border rounded" style="min-height: 200px;" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
